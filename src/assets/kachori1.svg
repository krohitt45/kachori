<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#2a2520"/>
  
  <!-- Plate -->
  <ellipse cx="100" cy="140" rx="70" ry="20" fill="#8B7355" opacity="0.5"/>
  
  <!-- Single Kachori -->
  <g transform="translate(100, 85)">
    <!-- Main spherical body with bumpy texture -->
    <circle cx="0" cy="0" r="35" fill="#D4A017" stroke="#8B6914" stroke-width="1"/>
    
    <!-- Surface bumps for texture -->
    <circle cx="15" cy="-20" r="4" fill="#E6B800"/>
    <circle cx="-18" cy="-15" r="3.5" fill="#E6B800"/>
    <circle cx="20" cy="8" r="3" fill="#E6B800"/>
    <circle cx="-15" cy="18" r="3.5" fill="#E6B800"/>
    
    <!-- Lighter side for 3D effect -->
    <path d="M -20,-15 Q -5,-30 15,-20 Q 25,-10 20,5" fill="#E6B800" opacity="0.6"/>
    
    <!-- Darker shadow side -->
    <path d="M -25,10 Q -20,25 -5,28 Q 5,25 8,15" fill="#A0860A" opacity="0.5"/>
    
    <!-- Shine highlight -->
    <ellipse cx="-15" cy="-20" rx="7" ry="5" fill="#FFF8DC" opacity="0.6"/>
  </g>
</svg>